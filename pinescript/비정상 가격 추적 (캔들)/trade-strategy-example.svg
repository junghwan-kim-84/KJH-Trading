<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1460" viewBox="0 0 1200 1460" role="img" aria-labelledby="title desc">
  <title id="title">비정상 가격 추적 캔들 실전 전략 예시</title>
  <desc id="desc">롱/숏 진입 후보와 스윕 다이아몬드를 이용한 롱숏 전략 예시</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff8ef"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #16263a; }
      .subtitle { font: 500 17px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #5a6b7b; }
      .label { font: 700 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #36516d; letter-spacing: 0.08em; }
      .panelTitle { font: 700 24px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #17283b; }
      .body { font: 500 16px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #273a4d; }
      .small { font: 500 14px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #56687a; }
      .tiny { font: 600 13px 'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; fill: #546676; }
      .center { text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="1460" fill="#eef2f7"/>
  <rect x="24" y="24" width="1152" height="1412" rx="28" fill="url(#bg)" stroke="#d6e0ea"/>

  <text x="60" y="86" class="title">비정상 가격 추적 (캔들) · 실전 전략 예시</text>
  <text x="60" y="118" class="subtitle">롱/숏 진입 후보는 첫 진입 후보, 다이아몬드는 스윕 다음 봉 재확인 신호로 보는 구조입니다.</text>

  <rect x="60" y="152" width="1080" height="560" rx="26" fill="#eef8ff" stroke="#c7dff5"/>
  <text x="92" y="190" class="label">LONG EXAMPLE</text>
  <text x="92" y="224" class="panelTitle">과매도 흡수 이후 롱 진입 후보, 그리고 하단 스윕 재확인</text>

  <rect x="92" y="246" width="540" height="238" rx="18" fill="#ffffff" stroke="#d8e3ed"/>
  <rect x="122" y="280" width="170" height="160" rx="16" fill="#e1f0ff"/>
  <polyline points="126,336 174,360 222,414 270,438 318,408 366,368 414,324 462,294 510,268 558,248" fill="none" stroke="#f2c94c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="142" y1="350" x2="142" y2="306" stroke="#d06a5a" stroke-width="6" stroke-linecap="round"/>
  <rect x="128" y="320" width="28" height="22" rx="5" fill="#ff8c3c"/>
  <line x1="190" y1="390" x2="190" y2="318" stroke="#cf6456" stroke-width="6" stroke-linecap="round"/>
  <rect x="176" y="336" width="28" height="40" rx="5" fill="#ff9b54"/>
  <line x1="238" y1="454" x2="238" y2="318" stroke="#239dca" stroke-width="6" stroke-linecap="round"/>
  <rect x="224" y="356" width="28" height="76" rx="5" fill="#63dbff"/>
  <polygon points="238,466 226,484 250,484" fill="#69e6ff"/>
  <text x="238" y="510" class="tiny center">강세 다이버전스</text>
  <line x1="302" y1="412" x2="302" y2="338" stroke="#22965f" stroke-width="6" stroke-linecap="round"/>
  <rect x="288" y="356" width="28" height="40" rx="5" fill="#35a96f"/>
  <circle cx="302" cy="412" r="7" fill="#009100"/>
  <rect x="286" y="396" width="92" height="62" rx="10" fill="#009100" opacity="0.20" stroke="#009100" stroke-width="2"/>
  <line x1="448" y1="394" x2="448" y2="470" stroke="#00ff00" stroke-width="6" stroke-linecap="round"/>
  <rect x="434" y="408" width="28" height="50" rx="5" fill="#00ff00"/>
  <line x1="498" y1="414" x2="498" y2="338" stroke="#33b55d" stroke-width="6" stroke-linecap="round"/>
  <rect x="484" y="354" width="28" height="42" rx="5" fill="#3acb76"/>
  <polygon points="498,478 486,496 510,496" fill="#00ff00"/>
  <rect x="482" y="354" width="96" height="70" rx="10" fill="#00ff00" opacity="0.16" stroke="#00ff00" stroke-width="2"/>

  <rect x="664" y="246" width="444" height="238" rx="18" fill="#ffffff" stroke="#d8e3ed"/>
  <text x="694" y="282" class="body">롱 해석</text>
  <text x="694" y="314" class="small">1. 하늘 비정상 캔들과 강세 다이버전스로 저점 흡수 자리 확인</text>
  <text x="694" y="338" class="small">2. 강세 배경 + 총 거래량 &gt; 10MA + buy 우위가 겹치면 롱 진입 후보</text>
  <text x="694" y="362" class="small">3. 롱 진입 후보 박스 하단을 스윕한 뒤, 다음 양봉이 밝은 초록 다이아몬드면 재확인</text>
  <text x="694" y="386" class="small">4. 다이아몬드는 buy &gt; sell 이고 거래량이 이전 스윕 봉의 50% 이상일 때만 확정</text>
  <text x="694" y="420" class="body">무효화</text>
  <text x="694" y="452" class="small">롱 진입 후보 박스와 스윕 박스를 모두 잃고 안착하면 롱 시나리오를 버립니다.</text>

  <rect x="92" y="518" width="1016" height="132" rx="18" fill="#ffffff" stroke="#d3e4ef"/>
  <text x="122" y="554" class="body">롱 요약</text>
  <text x="122" y="586" class="small">어두운 녹색 원은 첫 진입 후보, 밝은 초록 다이아몬드는 스윕 이후 재확인 후보입니다.</text>
  <text x="122" y="610" class="small">청산은 상단 저항, 약세 배경 전환, 직전 고점 부근처럼 공급이 다시 나올 수 있는 자리에서 분할로 접근합니다.</text>

  <rect x="60" y="738" width="1080" height="560" rx="26" fill="#fff1f3" stroke="#efc5cb"/>
  <text x="92" y="776" class="label">SHORT EXAMPLE</text>
  <text x="92" y="810" class="panelTitle">과매수 분산 이후 숏 진입 후보 + 상단 스윕 재확인</text>

  <rect x="92" y="832" width="540" height="238" rx="18" fill="#ffffff" stroke="#d8e3ed"/>
  <rect x="378" y="864" width="170" height="160" rx="16" fill="#ffe5e5"/>
  <polyline points="126,844 174,826 222,850 270,894 318,936 366,974 414,996 462,1010 510,998 558,964" fill="none" stroke="#f2c94c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="142" y1="878" x2="142" y2="832" stroke="#d27a42" stroke-width="6" stroke-linecap="round"/>
  <rect x="128" y="846" width="28" height="24" rx="5" fill="#ff8c3c"/>
  <line x1="190" y1="896" x2="190" y2="820" stroke="#d66f46" stroke-width="6" stroke-linecap="round"/>
  <rect x="176" y="836" width="28" height="42" rx="5" fill="#ffa35c"/>
  <line x1="238" y1="848" x2="238" y2="980" stroke="#c95d4e" stroke-width="6" stroke-linecap="round"/>
  <rect x="224" y="864" width="28" height="72" rx="5" fill="#ff8a45"/>
  <polygon points="284,854 272,836 296,836" fill="#ff8c00"/>
  <text x="316" y="856" class="tiny">약세 다이버전스</text>
  <line x1="430" y1="942" x2="430" y2="1014" stroke="#c52828" stroke-width="6" stroke-linecap="round"/>
  <rect x="416" y="954" width="28" height="40" rx="5" fill="#da4141"/>
  <circle cx="430" cy="942" r="7" fill="#d21919"/>
  <rect x="414" y="954" width="96" height="62" rx="10" fill="#d21919" opacity="0.18" stroke="#d21919" stroke-width="2"/>
  <line x1="542" y1="860" x2="542" y2="936" stroke="#ff0000" stroke-width="6" stroke-linecap="round"/>
  <rect x="528" y="876" width="28" height="48" rx="5" fill="#ff0000"/>
  <line x1="590" y1="896" x2="590" y2="982" stroke="#d43c3c" stroke-width="6" stroke-linecap="round"/>
  <rect x="576" y="912" width="28" height="48" rx="5" fill="#ef5555"/>
  <polygon points="590,882 578,864 602,864" fill="#ff0000"/>
  <rect x="574" y="912" width="96" height="70" rx="10" fill="#ff0000" opacity="0.16" stroke="#ff0000" stroke-width="2"/>

  <rect x="664" y="832" width="444" height="238" rx="18" fill="#ffffff" stroke="#d8e3ed"/>
  <text x="694" y="868" class="body">숏 해석</text>
  <text x="694" y="900" class="small">1. 주황 비정상 캔들과 약세 다이버전스로 상단 분산 자리 확인</text>
  <text x="694" y="924" class="small">2. 약세 배경 + 총 거래량 &gt; 10MA + sell 우위가 겹치면 숏 진입 후보</text>
  <text x="694" y="948" class="small">3. 숏 진입 후보 박스 상단을 스윕한 뒤, 다음 음봉이 밝은 빨강 다이아몬드면 재확인</text>
  <text x="694" y="972" class="small">4. 다이아몬드는 sell &gt; buy 이고 거래량이 이전 스윕 봉의 50% 이상일 때만 확정</text>
  <text x="694" y="1006" class="body">무효화</text>
  <text x="694" y="1038" class="small">숏 진입 후보 박스와 스윕 박스를 모두 회복해 안착하면 숏 시나리오를 버립니다.</text>

  <rect x="92" y="1104" width="1016" height="132" rx="18" fill="#ffffff" stroke="#ecd2d6"/>
  <text x="122" y="1140" class="body">숏 요약</text>
  <text x="122" y="1172" class="small">어두운 빨강 원은 첫 진입 후보, 밝은 빨강 다이아몬드는 스윕 이후 재확인 후보입니다.</text>
  <text x="122" y="1196" class="small">청산은 하단 지지, 강세 배경 전환, 직전 저점 부근처럼 수요가 다시 붙을 수 있는 자리에서 분할로 접근합니다.</text>

  <rect x="60" y="1324" width="1080" height="70" rx="18" fill="#fff9ea" stroke="#ead8ab"/>
  <text x="600" y="1366" class="small center">공통 규칙: 다이아몬드와 밝은 스윕 박스는 스윕 다음 봉이 같은 방향으로 마감하고, 거래량이 이전 스윕 봉의 50% 이상일 때만 확정됩니다.</text>
</svg>
