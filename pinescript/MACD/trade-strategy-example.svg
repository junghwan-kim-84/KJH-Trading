  <text x="96" y="606" class="body">롱 전략</text>
  <text x="96" y="634" class="small">1. MACD가 Signal 위인지 먼저 확인</text>
  <text x="96" y="656" class="small">2. 초록 다이버전스가 몇 봉 유지되는지 확인</text>
  <text x="96" y="678" class="small">3. 같은 방향 초록 원이 나오면 롱 우선</text>
  <text x="96" y="700" class="small">4. 초록이 바로 사라지면 추격보다 관망</text>

