  <text x="716" y="606" class="body">숏 전략</text>
  <text x="716" y="634" class="small">1. MACD가 Signal 아래인지 먼저 확인</text>
  <text x="716" y="656" class="small">2. 빨강 다이버전스가 몇 봉 유지되는지 확인</text>
